<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 860" preserveAspectRatio="xMidYMid meet" font-family="'IBM Plex Sans', system-ui, sans-serif" role="img" aria-labelledby="t d">
  <title id="t">Lumen Health — Data Treatment &amp; Routing</title>
  <desc id="d">How ingested data is routed: structured medical data (rows, scores, dates, values) goes to Neon Postgres; opaque blobs (PDF, DICOM, DOCX, wearable exports) go to Cloudflare R2 with a Postgres pointer row referencing the blob key. Shows the patient-partitioned key scheme and the DICOM-canonical to JPEG-preview path.</desc>

  <defs>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0 H0 V64" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 1 L9 5 L0 9" fill="none" stroke="#6BA3C7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 1 L9 5 L0 9" fill="none" stroke="#F4B942" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .mono   { font-family:'IBM Plex Mono', monospace; letter-spacing:0.22em; fill:#6F7E9A; }
      .ntitle { font-family:'Raleway', sans-serif; font-weight:400; fill:#F0F4F8; }
      .body   { font-family:'IBM Plex Sans', system-ui, sans-serif; fill:#A4B2CC; }
      .bodyhi { font-family:'IBM Plex Sans', system-ui, sans-serif; fill:#F0F4F8; }
      .cap    { font-family:'IBM Plex Mono', monospace; letter-spacing:0.08em; fill:#6F7E9A; }
      .keymono{ font-family:'IBM Plex Mono', monospace; letter-spacing:0.02em; fill:#94BBD3; }
      .card   { fill:#131F37; stroke:#283655; stroke-width:1; }
      .soft   { fill:rgba(107,163,199,0.10); stroke:#3E5070; stroke-width:1; }
      .flow   { fill:none; stroke:#6BA3C7; stroke-width:1.8; stroke-linecap:round; }
      .flowg  { fill:none; stroke:#F4B942; stroke-width:2.4; stroke-linecap:round; }
      .ptr    { fill:none; stroke:#94BBD3; stroke-width:1.6; stroke-dasharray:5 5; stroke-linecap:round; }
    </style>
  </defs>

  <rect width="1600" height="860" fill="#0A1428"/>
  <rect width="1600" height="860" fill="url(#grid)"/>

  <!-- TITLE -->
  <g transform="translate(48,52)">
    <g transform="translate(22,18) scale(0.62)">
      <path d="M 0 22 C -20 6, -28 -2, -20 -14 C -12 -22, -4 -18, 0 -10 C 4 -18, 12 -22, 20 -14 C 28 -2, 20 6, 0 22 Z" fill="#244E6E" fill-opacity="0.7" stroke="#6BA3C7" stroke-width="0.7" stroke-linejoin="round"/>
      <path d="M -36 0 L -22 0 L -16 4 L -10 -4 L -2 -16 L 6 14 L 12 -4 L 18 0 L 36 0" stroke="#F4B942" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="58" y="14" class="ntitle" font-size="27" font-weight="300" letter-spacing="0.04em">Lumen Health</text>
    <text x="58" y="36" class="mono" font-size="11">03 · DATA TREATMENT &amp; ROUTING</text>
    <text x="58" y="52" class="cap" font-size="9.5" letter-spacing="0.28em">FROM DATA TO INSIGHTS</text>
  </g>

  <!-- CLASSIFIED FILE -->
  <g>
    <rect x="56" y="350" width="300" height="150" rx="14" class="card"/>
    <text x="78" y="380" class="mono" font-size="10">INPUT</text>
    <text x="78" y="410" class="ntitle" font-size="18">Classified file</text>
    <text x="78" y="438" class="body" font-size="12.5">One import_files row</text>
    <text x="78" y="460" class="body" font-size="12.5">+ class label + patient_id</text>
    <text x="78" y="486" class="cap" font-size="10.5">scoped to one patient</text>
  </g>

  <!-- ROUTER -->
  <g>
    <rect x="412" y="330" width="280" height="190" rx="14" fill="rgba(244,185,66,0.06)" stroke="#F4B942" stroke-width="1.6"/>
    <text x="434" y="362" class="mono" font-size="10" fill="#F4B942">ROUTING DECISION</text>
    <text x="434" y="396" class="body" font-size="13">Is the payload structured</text>
    <text x="434" y="416" class="body" font-size="13">data — rows, scores,</text>
    <text x="434" y="436" class="body" font-size="13">dates, numeric values?</text>
    <text x="434" y="472" class="cap" font-size="11" fill="#86D9A6">yes ↑  relational</text>
    <text x="434" y="496" class="cap" font-size="11" fill="#94BBD3">no  ↓  opaque bytes</text>
  </g>

  <!-- POSTGRES (structured, up) -->
  <g>
    <rect x="780" y="120" width="470" height="270" rx="14" class="card"/>
    <text x="802" y="150" class="mono" font-size="10" fill="#6BA3C7">RELATIONAL · NEON POSTGRES (FRANKFURT)</text>
    <text x="802" y="180" class="ntitle" font-size="19">Structured rows</text>
    <text x="802" y="206" class="body" font-size="12.5">Every row carries patient_id · ON DELETE CASCADE</text>
    <g class="body" font-size="12.5">
      <text x="802"  y="238">lab_results</text>
      <text x="802"  y="262">medications</text>
      <text x="802"  y="286">vitals_daily</text>
      <text x="802"  y="310">glucose_points</text>
      <text x="1030" y="238">ecg_events</text>
      <text x="1030" y="262">pgx_findings</text>
      <text x="1030" y="286">psych_items · mood_entries</text>
      <text x="1030" y="310">life_events · encounters</text>
    </g>
    <rect x="802" y="328" width="426" height="42" rx="8" fill="rgba(148,187,211,0.10)" stroke="rgba(148,187,211,0.4)"/>
    <text x="816" y="354" class="keymono" font-size="11.5">row.source_blob_key → R2 key (pointer to original)</text>
  </g>

  <!-- R2 (blobs, down) -->
  <g>
    <rect x="780" y="470" width="470" height="270" rx="14" class="card"/>
    <text x="802" y="500" class="mono" font-size="10" fill="#6BA3C7">OBJECT STORAGE · CLOUDFLARE R2 (EU)</text>
    <text x="802" y="530" class="ntitle" font-size="19">Opaque blobs</text>
    <text x="802" y="556" class="body" font-size="12.5">Original bytes stored verbatim — never the DB</text>
    <g class="body" font-size="12.5">
      <text x="802"  y="588">PDF reports</text>
      <text x="802"  y="612">DICOM series</text>
      <text x="1030" y="588">DOCX writings</text>
      <text x="1030" y="612">wearable export bundles</text>
    </g>
    <rect x="802" y="630" width="426" height="92" rx="8" fill="rgba(107,163,199,0.10)" stroke="#3E5070"/>
    <text x="816" y="656" class="mono" font-size="9.5" fill="#6F7E9A">PATIENT-PARTITIONED KEY</text>
    <text x="816" y="682" class="keymono" font-size="12.5">patients/{patient_id}/imports/</text>
    <text x="816" y="704" class="keymono" font-size="12.5">{import_id}/{ts}_{filename}</text>
  </g>

  <!-- DICOM panel -->
  <g>
    <rect x="1290" y="470" width="252" height="270" rx="14" class="soft"/>
    <text x="1310" y="500" class="mono" font-size="9.5" fill="#6BA3C7">IMAGING · DICOM</text>
    <text x="1310" y="528" class="ntitle" font-size="16">Canonical + preview</text>
    <text x="1310" y="556" class="body" font-size="12">DICOM = canonical format</text>
    <text x="1310" y="580" class="body" font-size="12">stored at blob_prefix</text>
    <text x="1310" y="612" class="body" font-size="12"><tspan fill="#E8C977">planned:</tspan> dcmjs metadata</text>
    <text x="1310" y="636" class="body" font-size="12">+ JPEG previews for</text>
    <text x="1310" y="660" class="body" font-size="12">browser &amp; LLM vision</text>
    <rect x="1310" y="678" width="212" height="44" rx="8" fill="rgba(107,163,199,0.10)" stroke="#3E5070"/>
    <text x="1322" y="700" class="keymono" font-size="10.5">imaging_studies</text>
    <text x="1322" y="716" class="keymono" font-size="10.5">.jpeg_preview_prefix</text>
  </g>

  <!-- enums / integrity note (top-right) -->
  <g>
    <rect x="1290" y="120" width="252" height="270" rx="14" class="card"/>
    <text x="1310" y="150" class="mono" font-size="9.5" fill="#6BA3C7">INTEGRITY MODEL</text>
    <text x="1310" y="178" class="ntitle" font-size="16">One source of truth</text>
    <text x="1310" y="206" class="body" font-size="12">Postgres holds the key,</text>
    <text x="1310" y="228" class="body" font-size="12">not the bytes.</text>
    <text x="1310" y="258" class="body" font-size="12">Delete a patient →</text>
    <text x="1310" y="280" class="body" font-size="12">CASCADE clears rows;</text>
    <text x="1310" y="302" class="body" font-size="12">R2 objects deleted by</text>
    <text x="1310" y="324" class="body" font-size="12">prefix (GDPR erasure).</text>
    <text x="1310" y="356" class="cap" font-size="10">timestamptz everywhere</text>
  </g>

  <!-- FLOWS -->
  <path class="flowg" d="M356 425 L 410 425" marker-end="url(#arrowGold)"/>
  <!-- router up to postgres -->
  <path class="flowg" d="M620 330 C 660 250, 720 255, 778 255" marker-end="url(#arrowGold)"/>
  <text x="640" y="285" class="cap" font-size="10.5" fill="#86D9A6">structured</text>
  <!-- router down to R2 -->
  <path class="flowg" d="M620 520 C 660 600, 720 600, 778 600" marker-end="url(#arrowGold)"/>
  <text x="648" y="580" class="cap" font-size="10.5" fill="#94BBD3">blob</text>
  <!-- pointer dashed Postgres -> R2 -->
  <path class="ptr" d="M1015 392 L 1015 468" marker-end="url(#arrow)"/>
  <text x="1028" y="436" class="cap" font-size="10" fill="#94BBD3">pointer row → blob</text>

  <!-- LEGEND -->
  <g transform="translate(56,560)">
    <rect x="0" y="0" width="660" height="180" rx="12" fill="#131F37" stroke="#283655"/>
    <text x="20" y="30" class="mono" font-size="9.5">LEGEND</text>
    <line x1="20" y1="58" x2="56" y2="58" class="flowg" marker-end="url(#arrowGold)"/>
    <text x="66" y="62" class="body" font-size="12.5">Routing path (structured vs. blob)</text>
    <line x1="20" y1="92" x2="56" y2="92" class="ptr" marker-end="url(#arrow)"/>
    <text x="66" y="96" class="body" font-size="12.5">Pointer: Postgres row references its R2 blob key</text>
    <rect x="20" y="116" width="16" height="16" rx="4" fill="rgba(244,185,66,0.06)" stroke="#F4B942"/>
    <text x="46" y="128" class="body" font-size="12.5">Routing decision</text>
    <text x="20" y="160" class="cap" font-size="10.5">Rule: rows/scores/dates → Postgres · raw files → R2 · pointer links them</text>
  </g>
</svg>
