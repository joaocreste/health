<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet" font-family="'IBM Plex Sans', system-ui, sans-serif" role="img" aria-labelledby="t d">
  <title id="t">Lumen Health — Data Residency &amp; Locations</title>
  <desc id="d">Geography of the system: patients across US, UK, EU, Brazil and Canada reach a global Cloudflare edge, but personal health information physically lives only in the EU — Neon Postgres in Frankfurt and Cloudflare R2 in the EU jurisdiction. The Anthropic model API sits outside the residency zone. GDPR-first residency lets the platform serve all regions under Standard Contractual Clauses.</desc>

  <defs>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0 H0 V64" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 1 L9 5 L0 9" fill="none" stroke="#6BA3C7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 1 L9 5 L0 9" fill="none" stroke="#F4B942" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 1 L9 5 L0 9" fill="none" stroke="#E89494" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .mono   { font-family:'IBM Plex Mono', monospace; letter-spacing:0.22em; fill:#6F7E9A; }
      .ntitle { font-family:'Raleway', sans-serif; font-weight:400; fill:#F0F4F8; }
      .body   { font-family:'IBM Plex Sans', system-ui, sans-serif; fill:#A4B2CC; }
      .bodyhi { font-family:'IBM Plex Sans', system-ui, sans-serif; fill:#F0F4F8; }
      .cap    { font-family:'IBM Plex Mono', monospace; letter-spacing:0.08em; fill:#6F7E9A; }
      .card   { fill:#131F37; stroke:#283655; stroke-width:1; }
      .soft   { fill:rgba(107,163,199,0.10); stroke:#3E5070; stroke-width:1; }
      .pill   { fill:rgba(107,163,199,0.10); stroke:#3E5070; stroke-width:1; }
      .flow   { fill:none; stroke:#6BA3C7; stroke-width:1.8; stroke-linecap:round; }
      .flowg  { fill:none; stroke:#F4B942; stroke-width:2.4; stroke-linecap:round; }
      .flowr  { fill:none; stroke:#E89494; stroke-width:1.8; stroke-dasharray:5 5; stroke-linecap:round; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#0A1428"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <!-- TITLE -->
  <g transform="translate(48,52)">
    <g transform="translate(22,18) scale(0.62)">
      <path d="M 0 22 C -20 6, -28 -2, -20 -14 C -12 -22, -4 -18, 0 -10 C 4 -18, 12 -22, 20 -14 C 28 -2, 20 6, 0 22 Z" fill="#244E6E" fill-opacity="0.7" stroke="#6BA3C7" stroke-width="0.7" stroke-linejoin="round"/>
      <path d="M -36 0 L -22 0 L -16 4 L -10 -4 L -2 -16 L 6 14 L 12 -4 L 18 0 L 36 0" stroke="#F4B942" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="58" y="14" class="ntitle" font-size="27" font-weight="300" letter-spacing="0.04em">Lumen Health</text>
    <text x="58" y="36" class="mono" font-size="11">04 · DATA RESIDENCY &amp; LOCATIONS</text>
    <text x="58" y="52" class="cap" font-size="9.5" letter-spacing="0.28em">FROM DATA TO INSIGHTS</text>
  </g>

  <!-- DATA SUBJECTS -->
  <g>
    <rect x="56" y="200" width="300" height="430" rx="14" class="card"/>
    <text x="78" y="230" class="mono" font-size="10">DATA SUBJECTS · PATIENTS</text>
    <text x="78" y="260" class="ntitle" font-size="18">Served globally</text>
    <g>
      <rect x="78" y="282" width="256" height="46" rx="10" class="pill"/><circle cx="100" cy="305" r="4" fill="#6BA3C7"/><text x="116" y="310" class="bodyhi" font-size="13.5">United States</text><text x="318" y="310" class="cap" font-size="11" text-anchor="end">US</text>
      <rect x="78" y="338" width="256" height="46" rx="10" class="pill"/><circle cx="100" cy="361" r="4" fill="#6BA3C7"/><text x="116" y="366" class="bodyhi" font-size="13.5">United Kingdom</text><text x="318" y="366" class="cap" font-size="11" text-anchor="end">UK</text>
      <rect x="78" y="394" width="256" height="46" rx="10" class="pill"/><circle cx="100" cy="417" r="4" fill="#F4B942"/><text x="116" y="422" class="bodyhi" font-size="13.5">European Union / EEA</text><text x="318" y="422" class="cap" font-size="11" text-anchor="end">EU</text>
      <rect x="78" y="450" width="256" height="46" rx="10" class="pill"/><circle cx="100" cy="473" r="4" fill="#6BA3C7"/><text x="116" y="478" class="bodyhi" font-size="13.5">Brazil</text><text x="318" y="478" class="cap" font-size="11" text-anchor="end">BR</text>
      <rect x="78" y="506" width="256" height="46" rx="10" class="pill"/><circle cx="100" cy="529" r="4" fill="#6BA3C7"/><text x="116" y="534" class="bodyhi" font-size="13.5">Canada</text><text x="318" y="534" class="cap" font-size="11" text-anchor="end">CA</text>
    </g>
    <text x="78" y="582" class="body" font-size="12">Cross-border transfers covered</text>
    <text x="78" y="602" class="body" font-size="12">by Standard Contractual Clauses</text>
  </g>

  <!-- CLOUDFLARE GLOBAL EDGE -->
  <g>
    <rect x="424" y="200" width="236" height="430" rx="14" class="soft"/>
    <text x="446" y="230" class="mono" font-size="9.5" fill="#6BA3C7">TRANSIT &amp; COMPUTE</text>
    <text x="446" y="262" class="ntitle" font-size="18">Cloudflare</text>
    <text x="446" y="284" class="ntitle" font-size="18">global edge</text>
    <text x="446" y="320" class="body" font-size="12.5">Anycast PoPs worldwide</text>
    <text x="446" y="344" class="body" font-size="12.5">TLS termination</text>
    <text x="446" y="368" class="body" font-size="12.5">Worker executes here</text>
    <rect x="446" y="392" width="192" height="80" rx="10" fill="rgba(134,217,166,0.08)" stroke="rgba(134,217,166,0.4)"/>
    <text x="462" y="418" class="mono" font-size="9" fill="#86D9A6">NO PHI AT REST</text>
    <text x="462" y="440" class="body" font-size="11.5">Edge holds data only</text>
    <text x="462" y="458" class="body" font-size="11.5">in transit, never stored</text>
    <text x="446" y="500" class="cap" font-size="10">routes to EU origin</text>
  </g>

  <!-- EU RESIDENCY ZONE -->
  <g>
    <rect x="724" y="170" width="560" height="500" rx="18" fill="rgba(244,185,66,0.05)" stroke="#F4B942" stroke-width="1.8" stroke-dasharray="8 6"/>
    <text x="748" y="206" class="mono" font-size="11" fill="#F4B942">EU DATA RESIDENCY ZONE · GDPR</text>
    <rect x="748" y="222" width="240" height="30" rx="8" fill="rgba(244,185,66,0.10)" stroke="#F4B942"/>
    <text x="762" y="243" class="mono" font-size="10" fill="#F4B942">PHI PHYSICALLY LIVES HERE</text>

    <!-- Neon -->
    <rect x="748" y="278" width="512" height="160" rx="14" class="card"/>
    <text x="770" y="308" class="mono" font-size="9.5" fill="#6BA3C7">RELATIONAL · STRUCTURED PHI</text>
    <text x="770" y="338" class="ntitle" font-size="19">Neon Postgres</text>
    <text x="770" y="366" class="body" font-size="13">Region: Frankfurt (eu-central-1)</text>
    <text x="770" y="390" class="body" font-size="13">All clinical rows · audit log · access grants</text>
    <text x="770" y="414" class="cap" font-size="10.5">reached from the Worker via Cloudflare Hyperdrive</text>

    <!-- R2 -->
    <rect x="748" y="458" width="512" height="160" rx="14" class="card"/>
    <text x="770" y="488" class="mono" font-size="9.5" fill="#6BA3C7">OBJECT STORAGE · BLOB PHI</text>
    <text x="770" y="518" class="ntitle" font-size="19">Cloudflare R2</text>
    <text x="770" y="546" class="body" font-size="13">EU jurisdiction · bucket jc-health-uploads</text>
    <text x="770" y="570" class="body" font-size="13">PDFs · DICOM · DOCX · wearable exports · previews</text>
    <text x="770" y="594" class="cap" font-size="10.5">patient-partitioned keys · deleted by prefix on erasure</text>
  </g>

  <!-- ANTHROPIC (outside zone) -->
  <g>
    <rect x="1330" y="278" width="214" height="232" rx="14" class="card"/>
    <text x="1350" y="308" class="mono" font-size="9.5" fill="#6BA3C7">MODEL · EXTERNAL</text>
    <text x="1350" y="338" class="ntitle" font-size="17">Anthropic API</text>
    <text x="1350" y="366" class="body" font-size="12">Outside the EU</text>
    <text x="1350" y="388" class="body" font-size="12">residency zone</text>
    <rect x="1350" y="404" width="174" height="86" rx="10" fill="rgba(232,148,148,0.10)" stroke="rgba(232,148,148,0.45)"/>
    <text x="1364" y="428" class="mono" font-size="9" fill="#E89494">CURRENT TIER</text>
    <text x="1364" y="450" class="body" font-size="11.5" fill="#E89494">PHI must not be</text>
    <text x="1364" y="468" class="body" font-size="11.5" fill="#E89494">sent to the model</text>
    <text x="1364" y="486" class="cap" font-size="9.5">see · 09 compliance</text>
  </g>

  <!-- FLOWS -->
  <path class="flow" d="M356 400 L 422 400" marker-end="url(#arrow)"/>
  <text x="360" y="388" class="cap" font-size="10">HTTPS · SCCs</text>
  <!-- edge -> Neon -->
  <path class="flowg" d="M660 340 C 700 340, 710 350, 746 355" marker-end="url(#arrowGold)"/>
  <text x="664" y="330" class="cap" font-size="10" fill="#F4B942">read/write PHI</text>
  <!-- edge -> R2 -->
  <path class="flowg" d="M660 470 C 700 500, 710 520, 746 528" marker-end="url(#arrowGold)"/>
  <text x="664" y="492" class="cap" font-size="10" fill="#F4B942">blobs</text>
  <!-- edge -> Anthropic (over the top, red dashed) -->
  <path class="flowr" d="M560 200 C 560 132, 1437 120, 1437 276" marker-end="url(#arrowRed)"/>
  <text x="980" y="118" class="cap" font-size="10" fill="#E89494">model calls — de-identified, no PHI on current tier</text>

  <!-- RATIONALE -->
  <g transform="translate(56,690)">
    <rect x="0" y="0" width="1228" height="172" rx="14" class="card"/>
    <text x="22" y="32" class="mono" font-size="10" fill="#F4B942">WHY EU-FIRST</text>
    <text x="22" y="64" class="bodyhi" font-size="14">GDPR is the strictest regime — building to it first makes every other jurisdiction a subset.</text>
    <text x="22" y="92" class="body" font-size="13">EU residency lets us onboard US / UK / Brazil / Canada patients under Standard Contractual Clauses without re-homing data.</text>
    <text x="22" y="120" class="body" font-size="13">A US-first footprint would create Schrems II / Data Privacy Framework transfer problems that are expensive to unwind later.</text>
    <text x="22" y="150" class="cap" font-size="11">Unambiguous answer to “where does PHI physically live?” — Frankfurt (Postgres) and the EU R2 jurisdiction. Nowhere else at rest.</text>
  </g>

  <!-- LEGEND -->
  <g transform="translate(1304,690)">
    <rect x="0" y="0" width="240" height="172" rx="14" class="card"/>
    <text x="20" y="30" class="mono" font-size="9.5">LEGEND</text>
    <rect x="20" y="46" width="16" height="16" rx="4" fill="rgba(244,185,66,0.05)" stroke="#F4B942" stroke-dasharray="4 3"/>
    <text x="46" y="58" class="body" font-size="11.5">PHI residency zone</text>
    <line x1="20" y1="86" x2="52" y2="86" class="flowg" marker-end="url(#arrowGold)"/>
    <text x="62" y="90" class="body" font-size="11.5">PHI read / write</text>
    <line x1="20" y1="116" x2="52" y2="116" class="flowr" marker-end="url(#arrowRed)"/>
    <text x="62" y="120" class="body" font-size="11.5">No-PHI (model)</text>
    <line x1="20" y1="146" x2="52" y2="146" class="flow" marker-end="url(#arrow)"/>
    <text x="62" y="150" class="body" font-size="11.5">Transit · SCCs</text>
  </g>
</svg>
