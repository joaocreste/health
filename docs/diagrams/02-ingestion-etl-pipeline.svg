<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet" font-family="'IBM Plex Sans', system-ui, sans-serif" role="img" aria-labelledby="t d">
  <title id="t">Lumen Health — Ingestion / ETL Pipeline</title>
  <desc id="d">The ETL flow from patient login and import portal through direct-to-R2 upload, LLM classification, parse-and-persist into Postgres and R2, section-specific LLM authoring, conditional rendering, future doctor review, and the per-patient chatbot. The primary path is highlighted in gold.</desc>

  <defs>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0 H0 V64" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 1 L9 5 L0 9" fill="none" stroke="#6BA3C7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 1 L9 5 L0 9" fill="none" stroke="#F4B942" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .mono   { font-family:'IBM Plex Mono', monospace; letter-spacing:0.22em; fill:#6F7E9A; }
      .ntitle { font-family:'Raleway', sans-serif; font-weight:400; fill:#F0F4F8; }
      .body   { font-family:'IBM Plex Sans', system-ui, sans-serif; fill:#A4B2CC; }
      .bodyhi { font-family:'IBM Plex Sans', system-ui, sans-serif; fill:#F0F4F8; }
      .cap    { font-family:'IBM Plex Mono', monospace; letter-spacing:0.10em; fill:#6F7E9A; }
      .num    { font-family:'IBM Plex Mono', monospace; fill:#F4B942; letter-spacing:0.05em; }
      .card   { fill:#131F37; stroke:#283655; stroke-width:1; }
      .soft   { fill:rgba(107,163,199,0.10); stroke:#3E5070; stroke-width:1; }
      .flow   { fill:none; stroke:#6BA3C7; stroke-width:1.8; stroke-linecap:round; }
      .flowg  { fill:none; stroke:#F4B942; stroke-width:2.4; stroke-linecap:round; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#0A1428"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <!-- TITLE BLOCK -->
  <g transform="translate(48,52)">
    <g transform="translate(22,18) scale(0.62)">
      <path d="M 0 22 C -20 6, -28 -2, -20 -14 C -12 -22, -4 -18, 0 -10 C 4 -18, 12 -22, 20 -14 C 28 -2, 20 6, 0 22 Z" fill="#244E6E" fill-opacity="0.7" stroke="#6BA3C7" stroke-width="0.7" stroke-linejoin="round"/>
      <path d="M -36 0 L -22 0 L -16 4 L -10 -4 L -2 -16 L 6 14 L 12 -4 L 18 0 L 36 0" stroke="#F4B942" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="58" y="14" class="ntitle" font-size="27" font-weight="300" letter-spacing="0.04em">Lumen Health</text>
    <text x="58" y="36" class="mono" font-size="11">02 · INGESTION PIPELINE</text>
    <text x="58" y="52" class="cap" font-size="9.5" letter-spacing="0.28em">FROM DATA TO INSIGHTS</text>
  </g>

  <!-- ======= ROW 1 (left -> right): 01..04 ======= -->
  <!-- 01 Login -->
  <g>
    <rect x="56" y="170" width="340" height="158" rx="14" class="card"/>
    <text x="78" y="200" class="num" font-size="13">01</text>
    <text x="118" y="201" class="mono" font-size="10">ENTRY</text>
    <text x="78" y="232" class="ntitle" font-size="18">Patient login</text>
    <text x="78" y="258" class="body" font-size="12.5">Demo DB auth today · Clerk (eventual)</text>
    <text x="78" y="280" class="body" font-size="12.5">POST /api/login</text>
    <text x="78" y="306" class="cap" font-size="10.5">role: patient · self-scope</text>
  </g>
  <!-- 02 Import portal -->
  <g>
    <rect x="443" y="170" width="340" height="158" rx="14" class="card"/>
    <text x="465" y="200" class="num" font-size="13">02</text>
    <text x="505" y="201" class="mono" font-size="10">INTAKE</text>
    <text x="465" y="232" class="ntitle" font-size="18">Import portal</text>
    <text x="465" y="258" class="body" font-size="12.5">Drag-drop a zip OR file-by-file</text>
    <text x="465" y="280" class="body" font-size="12.5">PDF · CSV · DICOM · DOCX</text>
    <text x="465" y="302" class="body" font-size="12.5">wearable exports (Apple/Oura/Withings)</text>
  </g>
  <!-- 03 Upload -->
  <g>
    <rect x="830" y="170" width="340" height="158" rx="14" class="card"/>
    <text x="852" y="200" class="num" font-size="13">03</text>
    <text x="892" y="201" class="mono" font-size="10">TRANSFER</text>
    <text x="852" y="232" class="ntitle" font-size="18">Upload to R2</text>
    <text x="852" y="258" class="body" font-size="12.5"><tspan fill="#E8C977">target:</tspan> signed-URL direct-to-R2</text>
    <text x="852" y="280" class="body" font-size="12.5"><tspan fill="#86D9A6">today:</tspan> multipart POST /api/ingest</text>
    <text x="852" y="306" class="cap" font-size="10">100 MB worker body cap vs 2 GB+ folders</text>
  </g>
  <!-- 04 Classify -->
  <g>
    <rect x="1217" y="170" width="340" height="158" rx="14" class="card"/>
    <text x="1239" y="200" class="num" font-size="13">04</text>
    <text x="1279" y="201" class="mono" font-size="10">CLASSIFY · LLM</text>
    <text x="1239" y="232" class="ntitle" font-size="18">Classification</text>
    <text x="1239" y="258" class="body" font-size="12.5">Haiku 4.5 — non-PDF (sample/MIME)</text>
    <text x="1239" y="280" class="body" font-size="12.5">Sonnet 4.6 — PDF classify + extract</text>
    <text x="1239" y="306" class="cap" font-size="10.5">13-label taxonomy ↓</text>
  </g>

  <!-- row1 gold arrows -->
  <path class="flowg" d="M396 249 L 441 249" marker-end="url(#arrowGold)"/>
  <path class="flowg" d="M783 249 L 828 249" marker-end="url(#arrowGold)"/>
  <path class="flowg" d="M1170 249 L 1215 249" marker-end="url(#arrowGold)"/>

  <!-- elbow 04 -> 05 (drop straight down, snake) -->
  <path class="flowg" d="M1387 328 L 1387 398" marker-end="url(#arrowGold)"/>

  <!-- ======= ROW 2 (right -> left): 05..07 ======= -->
  <!-- 05 Parse & persist -->
  <g>
    <rect x="1217" y="400" width="340" height="168" rx="14" class="card"/>
    <text x="1239" y="430" class="num" font-size="13">05</text>
    <text x="1279" y="431" class="mono" font-size="10">PARSE · PERSIST</text>
    <text x="1239" y="462" class="ntitle" font-size="18">Parse &amp; persist</text>
    <text x="1239" y="488" class="body" font-size="12.5">Typed rows → Postgres tables</text>
    <text x="1239" y="510" class="body" font-size="12.5">Original bytes → R2 blob</text>
    <text x="1239" y="532" class="body" font-size="12.5"><tspan fill="#F0F4F8">documents</tspan> row written for every file</text>
    <text x="1239" y="556" class="cap" font-size="10">lab/writing extracted in phase 1; rest deferred</text>
  </g>
  <!-- 06 Authoring -->
  <g>
    <rect x="830" y="400" width="340" height="168" rx="14" class="card"/>
    <text x="852" y="430" class="num" font-size="13">06</text>
    <text x="892" y="431" class="mono" font-size="10">AUTHOR · LLM</text>
    <text x="852" y="462" class="ntitle" font-size="18">Section authoring</text>
    <text x="852" y="488" class="body" font-size="12.5">Section-specific generation passes</text>
    <text x="852" y="510" class="body" font-size="12.5">Fills the same templates Patient Zero has</text>
    <text x="852" y="532" class="body" font-size="12.5">Async job → patient_dashboards</text>
    <text x="852" y="556" class="cap" font-size="10">Opus 4.7 (insights) · Sonnet 4.6 (cards)</text>
  </g>
  <!-- 07 Conditional render -->
  <g>
    <rect x="443" y="400" width="340" height="168" rx="14" class="card"/>
    <text x="465" y="430" class="num" font-size="13">07</text>
    <text x="505" y="431" class="mono" font-size="10">RENDER</text>
    <text x="465" y="462" class="ntitle" font-size="18">Conditional render</text>
    <text x="465" y="488" class="body" font-size="12.5">Skip sections with thin input</text>
    <text x="465" y="510" class="body" font-size="12.5">Data-driven renderer or bespoke</text>
    <text x="465" y="532" class="body" font-size="12.5">Hero → Reports → AI cards → rest</text>
  </g>

  <!-- row2 left arrows -->
  <path class="flowg" d="M1215 484 L 1172 484" marker-end="url(#arrowGold)"/>
  <path class="flowg" d="M828 484 L 785 484" marker-end="url(#arrowGold)"/>

  <!-- elbow 07 -> downstream (drop) -->
  <path class="flowg" d="M613 568 L 613 628" marker-end="url(#arrowGold)"/>

  <!-- ======= ROW 3: downstream consumers ======= -->
  <!-- 08 Doctor review (future) -->
  <g>
    <rect x="443" y="630" width="340" height="150" rx="14" class="card" stroke-dasharray="4 4"/>
    <text x="465" y="660" class="num" font-size="13" fill="#6F7E9A">08</text>
    <text x="505" y="661" class="mono" font-size="10" fill="#E8C977">FUTURE</text>
    <text x="465" y="692" class="ntitle" font-size="18" fill="#A4B2CC">Doctor review</text>
    <text x="465" y="718" class="body" font-size="12.5">Review / edit generated dashboards</text>
    <text x="465" y="740" class="body" font-size="12.5">doctor↔patient via patient_access</text>
    <text x="465" y="762" class="cap" font-size="10.5">not in MVP</text>
  </g>
  <!-- 09 Chatbot -->
  <g>
    <rect x="56" y="630" width="340" height="150" rx="14" class="card"/>
    <text x="78" y="660" class="num" font-size="13">09</text>
    <text x="118" y="661" class="mono" font-size="10">SERVE</text>
    <text x="78" y="692" class="ntitle" font-size="18">Per-patient chatbot</text>
    <text x="78" y="718" class="body" font-size="12.5">POST /api/chat · SSE stream</text>
    <text x="78" y="740" class="body" font-size="12.5">Answers from the patient record</text>
    <text x="78" y="762" class="cap" font-size="10.5">Opus 4.7 · cached prompt (1h TTL)</text>
  </g>
  <!-- 07 -> 09 connector -->
  <path class="flow" d="M443 705 L 398 705" marker-end="url(#arrow)"/>

  <!-- ======= SIDE PANELS: taxonomy + status ======= -->
  <!-- Taxonomy -->
  <g>
    <rect x="830" y="600" width="727" height="180" rx="14" class="soft"/>
    <text x="852" y="630" class="mono" font-size="10" fill="#6BA3C7">CLASSIFICATION TAXONOMY · lib/ingest.js</text>
    <g class="body" font-size="12">
      <text x="852"  y="660">· lab_pdf → lab_results</text>
      <text x="852"  y="684">· writing → writings</text>
      <text x="852"  y="708">· dicom_series → imaging_studies</text>
      <text x="852"  y="732">· imaging_image → imaging_studies</text>
      <text x="852"  y="756">· medication_csv → medications</text>
      <text x="1130" y="660">· ecg_pdf / ecg_csv → ecg_events</text>
      <text x="1130" y="684">· genetics_report → pgx_findings</text>
      <text x="1130" y="708">· apple_health / oura_csv → vitals_daily</text>
      <text x="1130" y="732">· wheel_of_life_csv → wheel_of_life</text>
      <text x="1130" y="756">· doctor_report → encounters</text>
    </g>
    <text x="852" y="776" class="cap" font-size="10" fill="#6F7E9A">unclassified → documents (catch-all)</text>
  </g>

  <!-- LEGEND + status (bottom-left under chatbot is taken; place compact legend top-right) -->
  <g transform="translate(830,118)">
    <rect x="0" y="0" width="727" height="38" rx="10" fill="#131F37" stroke="#283655"/>
    <line x1="20" y1="19" x2="56" y2="19" class="flowg" marker-end="url(#arrowGold)"/>
    <text x="66" y="23" class="body" font-size="12">Primary path</text>
    <line x1="200" y1="19" x2="236" y2="19" class="flow" marker-end="url(#arrow)"/>
    <text x="246" y="23" class="body" font-size="12">Secondary feed</text>
    <rect x="400" y="11" width="16" height="14" rx="3" fill="#131F37" stroke="#283655" stroke-dasharray="4 4"/>
    <text x="426" y="23" class="body" font-size="12">Planned / future</text>
    <text x="560" y="23" class="cap" font-size="9.5">status → completed · partial · failed</text>
  </g>
</svg>
