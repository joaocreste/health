<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JC Advisory — Patients</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css?v=43">
<link rel="icon" type="image/svg+xml" href="assets/logo.svg">
<style>
  .patients-wrap { max-width: 880px; margin: 64px auto; padding: 0 24px; font-family: 'IBM Plex Sans', sans-serif; }
  .patients-wrap h1 { font-family: 'Raleway', sans-serif; font-weight: 300; font-size: 32px; margin: 0 0 8px; color: #0D1B2A; }
  .patients-wrap p.sub { color: #7A8FA6; margin: 0 0 32px; font-size: 14px; }
  .live-pill { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 11px; font-family: 'IBM Plex Mono', monospace; margin-left: 8px; vertical-align: middle; }
  .live-pill.ok { background: #E8F1EA; color: #1F6A3E; border: 1px solid #B5D5BD; }
  .live-pill.err { background: #FBE9E7; color: #7A2E22; border: 1px solid #E5B5AB; }
  .live-pill.pending { background: #F0EEE9; color: #7A8FA6; border: 1px solid #DDD8CC; }
  .role-group { margin-top: 24px; }
  .role-group h2 { font-family: 'Raleway', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; font-size: 11px; color: #B8954A; margin: 0 0 8px; }
  .person-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border: 1px solid #E5E2DC; border-radius: 6px; background: #FFFFFF; margin-bottom: 6px; }
  .person-row .name { font-weight: 500; color: #0D1B2A; }
  .person-row .uuid { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #7A8FA6; }
  .meta-line { margin-top: 32px; font-size: 12px; color: #7A8FA6; font-family: 'IBM Plex Mono', monospace; }
  .back-link { display: inline-block; margin-bottom: 24px; font-size: 13px; color: #7A8FA6; text-decoration: none; }
  .back-link:hover { color: #0D1B2A; }
</style>
</head>
<body>

<main class="patients-wrap">
  <a href="home.html" class="back-link">← Back to summary</a>
  <h1>Patients in record<span class="live-pill pending" id="db-pill">checking DB…</span></h1>
  <p class="sub">Live read from the database. Source of truth for who exists in the system.</p>

  <div id="patients-list">Loading…</div>

  <div class="meta-line" id="meta-line"></div>
</main>

<script>
  (function () {
    'use strict';
    if (sessionStorage.getItem('jc_authed') !== 'true') {
      location.replace('index.html');
      return;
    }

    var pill = document.getElementById('db-pill');
    var listEl = document.getElementById('patients-list');
    var metaEl = document.getElementById('meta-line');

    fetch('/api/patients', { headers: { 'Accept': 'application/json' } })
      .then(function (r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function (data) {
        var users = data.users || [];
        var patients = users.filter(function (u) { return u.role === 'patient'; });
        var doctors  = users.filter(function (u) { return u.role === 'doctor'; });
        var admins   = users.filter(function (u) { return u.role === 'admin'; });

        pill.textContent = 'DB live · ' + users.length + ' rows';
        pill.className = 'live-pill ok';

        var html = '';
        if (patients.length) {
          html += '<div class="role-group"><h2>Patients (' + patients.length + ')</h2>';
          patients.forEach(function (p) {
            html += '<div class="person-row"><span class="name">' + escapeHtml(p.full_name || '(unnamed)') + '</span><span class="uuid">' + escapeHtml(p.id) + '</span></div>';
          });
          html += '</div>';
        }
        if (doctors.length) {
          html += '<div class="role-group"><h2>Doctors &amp; therapists (' + doctors.length + ')</h2>';
          doctors.forEach(function (d) {
            html += '<div class="person-row"><span class="name">' + escapeHtml(d.full_name || '(unnamed)') + '</span><span class="uuid">' + escapeHtml(d.id) + '</span></div>';
          });
          html += '</div>';
        }
        if (admins.length) {
          html += '<div class="role-group"><h2>Admins (' + admins.length + ')</h2>';
          admins.forEach(function (a) {
            html += '<div class="person-row"><span class="name">' + escapeHtml(a.full_name || '(unnamed)') + '</span><span class="uuid">' + escapeHtml(a.id) + '</span></div>';
          });
          html += '</div>';
        }

        listEl.innerHTML = html || '<p class="sub">No rows yet.</p>';
        metaEl.textContent = 'Source: Neon Postgres (Frankfurt) · /api/patients · ' + new Date().toISOString();
      })
      .catch(function (e) {
        pill.textContent = 'DB error';
        pill.className = 'live-pill err';
        listEl.innerHTML = '<p class="sub">Could not load patients: ' + escapeHtml(e.message) + '</p>';
      });

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, function (c) {
        return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
      });
    }
  })();
</script>
</body>
</html>
