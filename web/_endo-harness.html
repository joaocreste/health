<script>
/* ───────── Page-specific charts ─ health-palette tokens ───────── */
const C = {
  blue50:  '#EEF5FA', blue100: '#D8E8F2', blue200: '#B5D2E5',
  blue300: '#8BB8D2', blue400: '#5E97BC', blue500: '#3E7CA3',
  blue600: '#2F6489', blue700: '#244E6E', blue800: '#1B3B54',
  blue900: '#122A3D',
  green500: '#3D9460', green700: '#245F3C',
  amber500: '#C29327', amber700: '#785818',
  red500:   '#C73E3E', red700:   '#802626', red300: '#EB8585',
  ink:      '#1A2129',
  inkMid:   '#3E4956',
  inkSoft:  '#6E7B8A',
  inkFaint: '#94A0AE',
  grid:     'rgba(62,124,163,0.10)'
};

const axisCommon = {
  grid:   { color: C.grid, drawBorder: false },
  ticks:  { color: C.inkSoft },
};

/* Language helper — picks EN or PT for chart strings baked into Chart.js /
   Plotly configs. Reads html[lang], which initI18n (app.js) sets from
   localStorage synchronously on load, so charts build in the persisted
   language. The registry below lets us tear down + rebuild every chart when
   the user flips the .lang-btn toggle. */
const L = (en, pt) => (document.documentElement.lang === 'pt' ? pt : en);

/* ── Range view-model ──
   EVERY chart with a timestamped series reads from VR, not the data.js
   consts directly. "All" = the static consts (byte-identical to the
   pre-selector render); picking 30/60/90/custom swaps in the truncated
   series from GET /api/vitals-range (same shapes; GLUCOSE is filtered
   client-side from the full const) and re-renders. The only chart left
   unfiltered is the exercise mix — data.js carries cumulative totals
   only, no per-session dates. */
const VR_DEFAULTS = {
  WEIGHT, SLEEP_BOX, STEPS, HRV_RHR, STRESS_RES, BP,
  HR_BY_TOD, BP_BY_WEEK, SLEEP_STAGES_BY_WEEK, RHR_BY_WEEK, GLUCOSE,
};
const VR = { ...VR_DEFAULTS };

/* Each entry: a builder fn. buildAllCharts() (re)runs them; chart builders
   that hold a Chart.js instance destroy the prior one first via _vitalsCharts. */
const _vitalsBuilders = [];
const _vitalsCharts = {};
function buildAllCharts() {
  _vitalsBuilders.forEach((fn) => { try { fn(); } catch (e) { console.error('[chart build]', e); } });
}

/* 1 — Body composition (real data: 18 Withings readings, Oct 2025 → Apr 2026) */
_vitalsBuilders.push(function bodyChartBuild() {
  if (_vitalsCharts.body) _vitalsCharts.body.destroy();
  const W = VR.WEIGHT;
  _vitalsCharts.body = new Chart(document.getElementById('bodyChart'), {
  type: 'line',
  data: {
    labels: W.map(r => r[0]),
    datasets: [
      { label: L('Body weight (kg)', 'Peso corporal (kg)'), data: W.map(r => r[1]),
        borderColor: C.blue600, backgroundColor: 'rgba(94,151,188,0.18)', tension: 0.3, yAxisID: 'y', fill: true, borderWidth: 2, pointRadius: 3, pointBackgroundColor: C.blue600 },
      { label: L('Muscle mass (kg)', 'Massa muscular (kg)'), data: W.map(r => r[3]),
        borderColor: C.green500, backgroundColor: 'transparent', tension: 0.3, yAxisID: 'y', borderWidth: 2, pointRadius: 2, pointBackgroundColor: C.green500 },
      { label: L('Body fat (%)', 'Gordura corporal (%)'), data: W.map(r => r[2]),
        borderColor: C.red500, backgroundColor: 'transparent', tension: 0.3, yAxisID: 'y1', borderWidth: 2, pointRadius: 2, pointBackgroundColor: C.red500, borderDash: [4,4] },
    ]
  },
  options: {
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: { legend: { position: 'bottom', labels: { color: C.inkSoft } } },
    scales: {
      y:  { ...axisCommon, position: 'left',  title: { display: true, text: 'kg',  color: C.inkSoft }, min: 50, max: 90 },
      y1: { ...axisCommon, position: 'right', grid: { drawOnChartArea: false }, title: { display: true, text: '%', color: C.inkSoft }, min: 18, max: 30 },
      x:  { ...axisCommon, ticks: { ...axisCommon.ticks, maxTicksLimit: 9 } }
    }
  }
  });
});

/* 2 — Sleep stages — Tukey boxplot (1.5 × IQR whiskers).
   Source of truth: VR.SLEEP_BOX (data.js SLEEP_BOX on "All", /api/vitals-range
   for a truncated window — both regenerate with the same Tukey recipe). */

/* Boxplot palette — health-palette blue scale.
   Deep = blue-600 (most saturated), fading to blue-200 (cloud) at Awake;
   Total anchored in blue-900 as the umbrella value. */
const sleepFill   = [C.blue600, C.blue500, C.blue400, C.blue200, C.blue900];
const sleepStroke = [C.blue800, C.blue700, C.blue600, C.blue400, '#0B1A28'];

const hm = (h) => {
  if (h == null || isNaN(h)) return '–';
  const hh = Math.floor(h);
  const mm = Math.round((h - hh) * 60);
  return `${hh}h ${String(mm).padStart(2, '0')}m`;
};

_vitalsBuilders.push(function sleepStageChartBuild() {
  if (_vitalsCharts.sleep) _vitalsCharts.sleep.destroy();
  /* Stage labels EN/PT — index-aligned with the data array below. */
  const stageLabels = [
    L('Deep', 'Profundo'), L('REM', 'REM'), L('Light', 'Leve'),
    L('Awake', 'Acordado'), L('Total', 'Total')
  ];
  const sleepBox = VR.SLEEP_BOX;
  _vitalsCharts.sleep = new Chart(document.getElementById('sleepStageChart'), {
  type: 'boxplot',
  data: {
    labels: stageLabels,
    datasets: [{
      label: L('Hours per night', 'Horas por noite'),
      backgroundColor: sleepFill,
      borderColor: sleepStroke,
      borderWidth: 1.25,
      itemRadius: 0,
      meanRadius: 0,
      outlierRadius: 3,
      outlierBackgroundColor: sleepStroke,
      outlierBorderColor: sleepStroke,
      medianColor: '#1C2B2F',
      data: [sleepBox.deep, sleepBox.rem, sleepBox.light, sleepBox.awake, sleepBox.total],
    }]
  },
  options: {
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          title: (items) => items[0].label + L(' sleep', ' · sono'),
          label: (ctx) => {
            const v = ctx.parsed;
            return [
              `${L('Median:', 'Mediana:')}   ${hm(v.median)}`,
              `${L('IQR:', 'IIQ:')}      ${hm(v.q1)} – ${hm(v.q3)}`,
              `${L('Whiskers:', 'Hastes:')} ${hm(v.min)} – ${hm(v.max)}`,
              `${L('Mean:', 'Média:')}     ${hm(v.mean)}`,
              v.items && v.items.length ? `${L('Outliers:', 'Outliers:')} ${v.items.length}` : null,
            ].filter(Boolean);
          }
        }
      }
    },
    scales: {
      x: { ...axisCommon, ticks: { ...axisCommon.ticks, font: { size: 12 } } },
      y: {
        ...axisCommon,
        beginAtZero: true,
        title: { display: true, text: L('hours per night', 'horas por noite'), color: C.inkSoft },
        ticks: { ...axisCommon.ticks, callback: (v) => v + 'h' }
      }
    }
  }
  });
});

/* 3 — Exercise mix (real totals from Oura workout.csv) */
_vitalsBuilders.push(function exerciseMixChartBuild() {
  if (_vitalsCharts.exercise) _vitalsCharts.exercise.destroy();
  const sessionCounts = [146, 33, 3, 1];  // index-aligned with labels/data
  _vitalsCharts.exercise = new Chart(document.getElementById('exerciseMixChart'), {
  type: 'bar',
  data: {
    labels: [L('Walking', 'Caminhada'), L('Cycling', 'Ciclismo'), L('Strength', 'Força'), L('Swimming', 'Natação')],
    datasets: [{
      label: L('Total minutes', 'Minutos totais'),
      data: [2762, 900, 109, 60],
      backgroundColor: [C.blue400, C.blue600, C.green500, C.amber500],
      borderRadius: 4,
    }]
  },
  options: {
    indexAxis: 'y',
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: (ctx) => {
            const n = sessionCounts[ctx.dataIndex];
            return L(`${ctx.parsed.x} min · ${n} sessions`, `${ctx.parsed.x} min · ${n} sessões`);
          }
        }
      }
    },
    scales: {
      x: { ...axisCommon, title: { display: true, text: L('minutes (cumulative)', 'minutos (acumulado)'), color: C.inkSoft } },
      y: { ...axisCommon }
    }
  }
  });
});

/* 4 — Steps — pastel-blue bars at 25% opacity + weekly-median step line.
   Median is computed per ISO week (Mon–Sun). The line is held flat across
   each week and steps to the next value at the week boundary. */
_vitalsBuilders.push(function stepsChartBuild() {
  if (_vitalsCharts.steps) _vitalsCharts.steps.destroy();
  const STEPS_V = VR.STEPS;
  const stepsArr = STEPS_V.map(r => r[1]);

  /* Map every date to its ISO-week Monday, then bucket and median. */
  const isoMonday = (s) => {
    const d = new Date(s + 'T12:00:00Z');
    const dayIdx = (d.getUTCDay() + 6) % 7; // Mon=0 .. Sun=6
    d.setUTCDate(d.getUTCDate() - dayIdx);
    return d.toISOString().slice(0, 10);
  };
  const buckets = {};
  for (const [d, v] of STEPS_V) (buckets[isoMonday(d)] ||= []).push(v);
  const med = (a) => {
    const s = [...a].sort((x, y) => x - y);
    const m = Math.floor(s.length / 2);
    return s.length % 2 ? s[m] : (s[m - 1] + s[m]) / 2;
  };
  const weeklyMed = {};
  for (const w in buckets) weeklyMed[w] = Math.round(med(buckets[w]));
  const medianSeries = STEPS_V.map(([d]) => weeklyMed[isoMonday(d)]);

  _vitalsCharts.steps = new Chart(document.getElementById('stepsChart'), {
    type: 'bar',
    data: {
      labels: STEPS_V.map(r => r[0]),
      datasets: [
        {
          type: 'bar',
          label: L('Steps', 'Passos'),
          data: stepsArr,
          backgroundColor: 'rgba(139, 184, 210, 0.25)',  // blue-300 @ 25%
          borderColor:     'rgba(139, 184, 210, 0.55)',
          borderWidth: 1,
          borderRadius: 1,
          barPercentage: 0.95,
          categoryPercentage: 1.0,
        },
        {
          type: 'line',
          label: L('Weekly median', 'Mediana semanal'),
          data: medianSeries,
          borderColor: C.blue700,
          borderWidth: 2,
          pointRadius: 0,
          pointHoverRadius: 0,
          fill: false,
          tension: 0,
          stepped: 'middle',
        }
      ]
    },
    options: {
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: {
          title: (items) => items[0].label,
          label: (ctx) => ctx.datasetIndex === 0
            ? L(`${ctx.parsed.y.toLocaleString()} steps`, `${ctx.parsed.y.toLocaleString()} passos`)
            : L(`Weekly median: ${ctx.parsed.y.toLocaleString()}`, `Mediana semanal: ${ctx.parsed.y.toLocaleString()}`)
        }}
      },
      scales: {
        x: { ...axisCommon, ticks: { ...axisCommon.ticks, maxTicksLimit: 14, maxRotation: 0 } },
        y: { ...axisCommon, beginAtZero: true,
             title: { display: true, text: L('steps / day', 'passos / dia'), color: C.inkSoft },
             ticks: { ...axisCommon.ticks, callback: (v) => (v/1000) + 'k' } }
      }
    }
  });
});

/* 5 — HRV / RHR — monthly mean from real per-night Oura data */
_vitalsBuilders.push(function cardioChartBuild() {
  if (_vitalsCharts.cardio) _vitalsCharts.cardio.destroy();
  // Aggregate per month
  const buckets = {};
  for (const [d, hrv, rhr] of VR.HRV_RHR) {
    const m = d.slice(0, 7);
    if (!buckets[m]) buckets[m] = { hrv: [], rhr: [] };
    if (hrv != null) buckets[m].hrv.push(hrv);
    if (rhr != null) buckets[m].rhr.push(rhr);
  }
  const months = Object.keys(buckets).sort();
  const monthNames = L(['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
                       ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez']);
  const fmtMonth = (m) => monthNames[parseInt(m.slice(5,7),10)-1] + ' ' + m.slice(2,4);
  const mean = (a) => a.length ? a.reduce((s,v)=>s+v,0)/a.length : null;
  const hrvSeries = months.map(m => +mean(buckets[m].hrv).toFixed(1));
  const rhrSeries = months.map(m => +mean(buckets[m].rhr).toFixed(1));

  _vitalsCharts.cardio = new Chart(document.getElementById('cardioChart'), {
    type: 'line',
    data: {
      labels: months.map(fmtMonth),
      datasets: [
        { label: L('HRV (ms)', 'VFC (ms)'), data: hrvSeries,
          borderColor: C.blue600, backgroundColor: 'rgba(94,151,188,0.20)',
          tension: 0.35, yAxisID: 'y', fill: true, borderWidth: 2,
          pointRadius: 4, pointBackgroundColor: C.blue600 },
        { label: L('Resting HR (bpm)', 'FC em repouso (bpm)'), data: rhrSeries,
          borderColor: C.red500, backgroundColor: 'transparent',
          tension: 0.35, yAxisID: 'y1', borderWidth: 2, borderDash: [4,4],
          pointRadius: 4, pointBackgroundColor: C.red500 },
      ]
    },
    options: {
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { position: 'bottom', labels: { color: C.inkSoft } } },
      scales: {
        y:  { ...axisCommon, position: 'left',  title: { display: true, text: L('HRV (ms)', 'VFC (ms)'), color: C.inkSoft },
              min: 0, max: 35 },
        y1: { ...axisCommon, position: 'right', grid: { drawOnChartArea: false },
              title: { display: true, text: L('RHR (bpm)', 'FC rep. (bpm)'), color: C.inkSoft },
              min: 55, max: 80 },
        x:  { ...axisCommon }
      }
    }
  });
});

/* 5b — Stress & resilience — daily high-stress minutes (left axis) and the
 *      composite resilience score (right axis). Daily series is shown as a
 *      faint line; a 7-day centered rolling mean is overlaid bold so the
 *      eye reads the trend through the daily volatility. STRESS_RES is
 *      [day, stress_min, recovery_min, score, level, summary] tuples
 *      produced by extract_stress() in bin/extract.py.
 */
_vitalsBuilders.push(function stressChartBuild() {
  const SR = VR.STRESS_RES;
  if (!SR || !SR.length) return;
  if (_vitalsCharts.stress) _vitalsCharts.stress.destroy();
  const labels  = SR.map(r => r[0]);
  const stress  = SR.map(r => (typeof r[1] === 'number' ? r[1] : null));
  const score   = SR.map(r => (typeof r[3] === 'number' ? r[3] : null));

  // Centered 7-day rolling mean. Skips nulls so partial windows still resolve.
  const rolling = (arr, window) => {
    const half = Math.floor(window / 2);
    return arr.map((_, i) => {
      const slice = arr.slice(Math.max(0, i - half), i + half + 1)
                       .filter(v => typeof v === 'number');
      if (!slice.length) return null;
      return +(slice.reduce((s, v) => s + v, 0) / slice.length).toFixed(1);
    });
  };
  const stressMA = rolling(stress, 7);
  const scoreMA  = rolling(score,  7);

  _vitalsCharts.stress = new Chart(document.getElementById('stressChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: L('High-stress (min/day)', 'Alto estresse (min/dia)'), data: stress,
          borderColor: 'rgba(199,62,62,0.28)', backgroundColor: 'rgba(199,62,62,0.06)',
          tension: 0.25, yAxisID: 'y', fill: true, borderWidth: 1,
          pointRadius: 0, pointHoverRadius: 3, pointHoverBackgroundColor: C.red500 },
        { label: L('High-stress · 7-day mean', 'Alto estresse · média 7 dias'), data: stressMA,
          borderColor: C.red500, backgroundColor: 'transparent',
          tension: 0.35, yAxisID: 'y', borderWidth: 2.5,
          pointRadius: 0, pointHoverRadius: 4, pointHoverBackgroundColor: C.red500 },
        { label: L('Resilience score (0–100)', 'Pontuação de resiliência (0–100)'), data: score,
          borderColor: 'rgba(61,148,96,0.30)', backgroundColor: 'transparent',
          tension: 0.25, yAxisID: 'y1', borderWidth: 1,
          pointRadius: 0, pointHoverRadius: 3, pointHoverBackgroundColor: C.green500 },
        { label: L('Resilience · 7-day mean', 'Resiliência · média 7 dias'), data: scoreMA,
          borderColor: C.green500, backgroundColor: 'transparent',
          tension: 0.35, yAxisID: 'y1', borderWidth: 2.5, borderDash: [5,3],
          pointRadius: 0, pointHoverRadius: 4, pointHoverBackgroundColor: C.green500 },
      ]
    },
    options: {
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'bottom', labels: { color: C.inkSoft, boxWidth: 18 } },
        tooltip: {
          callbacks: {
            afterBody: (items) => {
              const row = SR[items[0].dataIndex];
              const bits = [];
              if (row[4]) bits.push(`${L('level:', 'nível:')} ${row[4]}`);
              if (row[5]) bits.push(`${L('summary:', 'resumo:')} ${row[5]}`);
              return bits.length ? bits.join(' · ') : '';
            }
          }
        }
      },
      scales: {
        y:  { ...axisCommon, position: 'left',
              title: { display: true, text: L('High-stress (min/day)', 'Alto estresse (min/dia)'), color: C.inkSoft },
              min: 0, max: 600,
              ticks: { ...axisCommon.ticks, stepSize: 120 } },
        y1: { ...axisCommon, position: 'right', grid: { drawOnChartArea: false },
              title: { display: true, text: L('Resilience score', 'Pontuação de resiliência'), color: C.inkSoft },
              min: 0, max: 100,
              ticks: { ...axisCommon.ticks, stepSize: 20 } },
        x:  { ...axisCommon,
              ticks: { ...axisCommon.ticks, autoSkip: true, maxTicksLimit: 12,
                       callback(value) {
                         const lbl = this.getLabelForValue(value);
                         return lbl ? lbl.slice(0, 7) : lbl;
                       } } },
      }
    }
  });
});

/* 6 — Blood pressure — daily means with monthly mean overlay */
_vitalsBuilders.push(function bpChartBuild() {
  if (_vitalsCharts.bp) _vitalsCharts.bp.destroy();
  // Per-month aggregate
  const buckets = {};
  for (const [d, sys, dia] of VR.BP) {
    const m = d.slice(0,7);
    if (!buckets[m]) buckets[m] = { sys: [], dia: [] };
    buckets[m].sys.push(sys);
    buckets[m].dia.push(dia);
  }
  const months = Object.keys(buckets).sort();
  const monthNames = L(['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
                       ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez']);
  const fmtMonth = (m) => monthNames[parseInt(m.slice(5,7),10)-1] + ' ' + m.slice(2,4);
  const mean = (a) => a.length ? a.reduce((s,v)=>s+v,0)/a.length : null;
  const sysM = months.map(m => +mean(buckets[m].sys).toFixed(1));
  const diaM = months.map(m => +mean(buckets[m].dia).toFixed(1));

  _vitalsCharts.bp = new Chart(document.getElementById('bpChart'), {
    type: 'bar',
    data: {
      labels: months.map(fmtMonth),
      datasets: [
        { label: L('Systolic (mmHg)', 'Sistólica (mmHg)'),  data: sysM, backgroundColor: C.blue300,
          borderColor: C.blue600, borderWidth: 1, borderRadius: 3 },
        { label: L('Diastolic (mmHg)', 'Diastólica (mmHg)'), data: diaM, backgroundColor: C.blue700,
          borderColor: C.blue900, borderWidth: 1, borderRadius: 3 },
      ]
    },
    options: {
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { color: C.inkSoft } },
        tooltip: { callbacks: {
          afterLabel: (ctx) => {
            const m = months[ctx.dataIndex];
            return L(`n = ${buckets[m].sys.length} readings`, `n = ${buckets[m].sys.length} leituras`);
          }
        }}
      },
      scales: {
        x: { ...axisCommon },
        y: { ...axisCommon, beginAtZero: false, min: 60, max: 170,
             title: { display: true, text: 'mmHg', color: C.inkSoft } }
      }
    }
  });
});

/* 6b — Blood pressure — daily readings, full timeline (Withings-style
 *      floating bars: thin pill from diastolic to systolic with hollow
 *      circles at each end, colour-coded by BP category). One continuous
 *      chart across all dates — no month navigation. */
_vitalsBuilders.push(function bpDailyChartBuild() {
  if (_vitalsCharts.bpDaily) _vitalsCharts.bpDaily.destroy();
  // ACC/AHA 2017 BP categories — colour by the worst-case (sys or dia).
  function bpColor(sys, dia) {
    if (sys >= 180 || dia >= 120) return '#7A1F1F'; // crisis
    if (sys >= 140 || dia >= 90)  return '#C0392B'; // Stage 2
    if (sys >= 130 || dia >= 80)  return '#D88B3A'; // Stage 1
    if (sys >= 120)               return '#E5C04A'; // Elevated
    return '#3F8A4D';                                 // Normal
  }

  const BP_V = VR.BP;
  const bpDaily_labels = BP_V.map(([d]) => d);          // ISO date strings, sorted
  const bpDaily_dataPts = BP_V.map(([d, sys, dia]) => ({
    x: d, y: [dia, sys], sys, dia,
  }));
  const bpDaily_colors  = BP_V.map(([_, sys, dia]) => bpColor(sys, dia));

  // Custom plugin: hollow circles at top (systolic) and bottom (diastolic)
  // of every floating bar. Hand-rendered after the dataset is drawn.
  const endpointCirclesPlugin = {
    id: 'bpEndpointCircles',
    afterDatasetsDraw(chart) {
      const ds = chart.data.datasets[0];
      if (!ds || !ds.data) return;
      const { ctx, scales: { x, y } } = chart;
      ds.data.forEach((pt, i) => {
        if (!pt || !Array.isArray(pt.y)) return;
        const xPx   = x.getPixelForValue(pt.x);
        const yLow  = y.getPixelForValue(pt.y[0]); // diastolic
        const yHigh = y.getPixelForValue(pt.y[1]); // systolic
        const color = Array.isArray(ds.borderColor) ? ds.borderColor[i] : ds.borderColor;
        ctx.save();
        ctx.lineWidth = 1.4;
        ctx.strokeStyle = color;
        ctx.fillStyle = '#FFFFFF';
        const r = 3.4;
        ctx.beginPath(); ctx.arc(xPx, yHigh, r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.arc(xPx, yLow,  r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        ctx.restore();
      });
    }
  };

  // Format an ISO date as "Nov 13" — used in tooltips and tick callbacks.
  const months = L(['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
                   ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez']);
  const fmtShort = (iso) => `${months[parseInt(iso.slice(5,7),10)-1]} ${parseInt(iso.slice(8,10),10)}`;

  // Tick callback: only show a label when the month changes (compact spacing
  // for a long timeline) — falls back to first day of each month.
  function tickFormatter(value, index, ticks) {
    const iso = bpDaily_labels[index];
    if (!iso) return '';
    const prev = index > 0 ? bpDaily_labels[index - 1] : null;
    const isFirst = !prev || prev.slice(0, 7) !== iso.slice(0, 7);
    return isFirst ? months[parseInt(iso.slice(5,7),10)-1] + ' ' + iso.slice(2,4) : '';
  }

  _vitalsCharts.bpDaily = new Chart(document.getElementById('bpDailyChart'), {
    type: 'bar',
    data: {
      labels: bpDaily_labels,
      datasets: [{
        label: 'BP',
        data: bpDaily_dataPts,
        borderColor: bpDaily_colors,
        backgroundColor: 'transparent',
        borderWidth: 1.5,
        borderRadius: 8,
        borderSkipped: false,
        barThickness: 5,
      }]
    },
    options: {
      maintainAspectRatio: false,
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          displayColors: false,
          callbacks: {
            title: (items) => fmtShort(items[0].label),
            label: (item) => `${item.raw.sys} / ${item.raw.dia} mmHg`,
          }
        }
      },
      scales: {
        x: {
          type: 'category',
          grid: { display: false },
          ticks: {
            color: C.inkSoft,
            autoSkip: false,
            maxRotation: 0,
            font: { size: 11 },
            callback: tickFormatter,
          }
        },
        y: {
          ...axisCommon,
          min: 50, max: 180,
          ticks: { ...axisCommon.ticks, stepSize: 25 },
          title: { display: true, text: 'mmHg', color: C.inkSoft }
        }
      }
    },
    plugins: [endpointCirclesPlugin]
  });
});

/* 7 — Glucose — Plotly line with a continuous colorscale on the value
   (red <60 / >180, green at 90, smooth gradient through amber). */
function renderGlucoseChart() {
  const el = document.getElementById('glucoseChart');
  if (!el) return;
  const showErr = (msg) => {
    el.innerHTML = '<div style="padding:1rem;color:#9b3535;font-size: 14px;">'
      + L('Glucose chart failed to load: ', 'Falha ao carregar o gráfico de glicose: ') + msg + '</div>';
    console.error('[glucose]', msg);
  };
  if (!VR.GLUCOSE) return showErr('GLUCOSE data not loaded');
  if (typeof Plotly  === 'undefined') return showErr('Plotly library not loaded');

  try {
    if (!VR.GLUCOSE.length) {
      el.innerHTML = '<div class="vr-empty"><span class="lang-en">No CGM data in the selected period (sensor worn 26 Apr – 2 May 2026).</span><span class="lang-pt">Sem dados de CGM no per&iacute;odo selecionado (sensor usado de 26 abr a 2 mai 2026).</span></div>';
      return;
    }
    const xs = VR.GLUCOSE.map(r => r[0]);
    const ys = VR.GLUCOSE.map(r => r[1]);

    /* Continuous colorscale anchored at the danger thresholds:
         40 deep red · 60 red · 75 amber · 90 green · 120 green ·
         140 amber · 180 red · 220 deep red.
       Plotly interpolates RGB between stops, giving a smooth red → amber
       → green → amber → red traffic-light gradient with green peaking at 90. */
    const CMIN = 40, CMAX = 220;
    const t = (v) => (v - CMIN) / (CMAX - CMIN);
    const colorscale = [
      [t(40),  'rgb(122, 31, 31)'],
      [t(60),  'rgb(192, 57, 43)'],
      [t(75),  'rgb(216,139, 58)'],
      [t(90),  'rgb( 63,138, 77)'],
      [t(120), 'rgb( 63,138, 77)'],
      [t(140), 'rgb(216,139, 58)'],
      [t(180), 'rgb(192, 57, 43)'],
      [t(220), 'rgb(122, 31, 31)'],
    ];

    /* One trace, lines+markers. The line is a faint neutral connector for
       continuity at zoom-out; the densely-packed colour-graded markers
       carry the gradient — at normal zoom they overlap into a continuous
       coloured ribbon. */
    const trace = {
      x: xs, y: ys,
      type: 'scatter',
      mode: 'lines+markers',
      line:   { color: 'rgba(62, 73, 86, 0.18)', width: 1, shape: 'spline' },
      marker: {
        size: 5,
        color: ys,
        colorscale,
        cmin: CMIN,
        cmax: CMAX,
        line: { width: 0 },
        showscale: false,
      },
      hovertemplate: '%{x|%a %d %b · %H:%M}<br><b>%{y} mg/dL</b><extra></extra>',
      showlegend: false,
    };

    const layout = {
      autosize: true,
      margin: { l: 52, r: 16, t: 8, b: 50 },
      paper_bgcolor: 'rgba(0,0,0,0)',
      plot_bgcolor:  'rgba(0,0,0,0)',
      font: { family: "'IBM Plex Sans', sans-serif", color: C.inkSoft, size: 12 },
      xaxis: {
        type: 'date',
        showgrid: true, gridcolor: C.grid,
        zeroline: false,
        tickformat: '%d %b\n%H:%M',
        tickfont: { color: C.inkSoft }
      },
      yaxis: {
        title: { text: 'mg/dL', font: { color: C.inkSoft } },
        range: [40, 220],
        showgrid: true, gridcolor: C.grid,
        zeroline: false,
        tickfont: { color: C.inkSoft },
        tickvals: [60, 70, 90, 140, 180]
      },
      hoverlabel: { bgcolor: '#FFFFFF', bordercolor: C.inkMid, font: { color: C.ink } },
      showlegend: false
    };

    const config = {
      displaylogo: false,
      responsive: true,
      modeBarButtonsToRemove: ['select2d', 'lasso2d', 'autoScale2d', 'toggleSpikelines']
    };

    Plotly.newPlot(el, [trace], layout, config);
    console.log('[glucose] rendered', xs.length, 'points');
  } catch (e) {
    showErr(e.message || String(e));
  }
}

/* 7b — Glucose daily patterns — every reading folded onto a 24-hour day,
   binned at 5-min slots; rendered as median + ±1 SD + ±2 SD bands. */
function renderGlucosePatternsChart() {
  const el = document.getElementById('glucosePatternsChart');
  if (!el) return;
  if (!VR.GLUCOSE || typeof Plotly === 'undefined') return;

  try {
    if (!VR.GLUCOSE.length) {
      el.innerHTML = '<div class="vr-empty"><span class="lang-en">No CGM data in the selected period (sensor worn 26 Apr – 2 May 2026).</span><span class="lang-pt">Sem dados de CGM no per&iacute;odo selecionado (sensor usado de 26 abr a 2 mai 2026).</span></div>';
      return;
    }
    /* Bin every reading into one of 288 five-minute slots (0..287). */
    const N = 288;
    const slots = Array.from({ length: N }, () => []);
    for (const [ts, v] of VR.GLUCOSE) {
      const h = parseInt(ts.slice(11, 13), 10);
      const m = parseInt(ts.slice(14, 16), 10);
      const k = Math.floor((h * 60 + m) / 5);
      if (k >= 0 && k < N) slots[k].push(v);
    }

    const median = (a) => {
      if (!a.length) return NaN;
      const s = [...a].sort((x, y) => x - y);
      const m = Math.floor(s.length / 2);
      return s.length % 2 ? s[m] : (s[m - 1] + s[m]) / 2;
    };
    const mean = (a) => a.length ? a.reduce((s, v) => s + v, 0) / a.length : NaN;
    const stdev = (a, m) => {
      if (a.length < 2) return 0;
      const v = a.reduce((s, x) => s + (x - m) ** 2, 0) / a.length;
      return Math.sqrt(v);
    };

    const rawMed  = slots.map(median);
    const rawMean = slots.map(mean);
    const rawSd   = slots.map((a, i) => stdev(a, rawMean[i]));

    /* Circular rolling mean — only ~7 days of data, so smooth aggressively
       (±6 slots ≈ 65-min window) and let midnight wrap. */
    const smooth = (arr, w) => {
      const n = arr.length;
      const out = new Array(n);
      for (let i = 0; i < n; i++) {
        let sum = 0, cnt = 0;
        for (let k = -w; k <= w; k++) {
          const j = (i + k + n) % n;
          if (!isNaN(arr[j])) { sum += arr[j]; cnt++; }
        }
        out[i] = cnt ? sum / cnt : NaN;
      }
      return out;
    };
    const W = 6;
    const med = smooth(rawMed,  W);
    const m1  = smooth(rawMean, W);
    const sd1 = smooth(rawSd,   W);

    const xs = Array.from({ length: N }, (_, i) => i * 5); // minutes since midnight

    /* Two stacked fill bands: ±2 SD outer (lighter), ±1 SD inner (darker).
       Plotly fills between consecutive traces with `fill: 'tonexty'`. */
    const lower2 = m1.map((m, i) => m - 2 * sd1[i]);
    const upper2 = m1.map((m, i) => m + 2 * sd1[i]);
    const lower1 = m1.map((m, i) => m - sd1[i]);
    const upper1 = m1.map((m, i) => m + sd1[i]);

    const noLine = { width: 0, color: 'rgba(0,0,0,0)' };
    const traces = [
      { x: xs, y: lower2, type: 'scatter', mode: 'lines', line: noLine,
        showlegend: false, hoverinfo: 'skip' },
      { x: xs, y: upper2, type: 'scatter', mode: 'lines', line: noLine,
        fill: 'tonexty', fillcolor: 'rgba(94, 151, 188, 0.25)',
        showlegend: false, hoverinfo: 'skip' },
      { x: xs, y: lower1, type: 'scatter', mode: 'lines', line: noLine,
        showlegend: false, hoverinfo: 'skip' },
      { x: xs, y: upper1, type: 'scatter', mode: 'lines', line: noLine,
        fill: 'tonexty', fillcolor: 'rgba(47, 100, 137, 0.45)',
        showlegend: false, hoverinfo: 'skip' },
      { x: xs, y: med, type: 'scatter', mode: 'lines',
        line: { color: '#1A2129', width: 2.5, shape: 'spline' },
        customdata: xs.map(min => {
          const h = Math.floor(min / 60), mm = min % 60;
          if (document.documentElement.lang === 'pt') {
            return `${String(h).padStart(2, '0')}:${String(mm).padStart(2, '0')}`;
          }
          const ampm = h < 12 ? 'am' : 'pm';
          const h12 = (h % 12) === 0 ? 12 : (h % 12);
          return `${h12}:${String(mm).padStart(2, '0')} ${ampm}`;
        }),
        hovertemplate: L('%{customdata}<br>Median <b>%{y:.0f} mg/dL</b><extra></extra>',
                         '%{customdata}<br>Mediana <b>%{y:.0f} mg/dL</b><extra></extra>'),
        showlegend: false }
    ];

    /* Target-range reference lines at 60 and 180 mg/dL. */
    const refLines = [
      { type: 'line', xref: 'paper', x0: 0, x1: 1, yref: 'y', y0: 60,  y1: 60,
        line: { color: '#3D9460', width: 1.2 } },
      { type: 'line', xref: 'paper', x0: 0, x1: 1, yref: 'y', y0: 180, y1: 180,
        line: { color: '#3D9460', width: 1.2 } },
    ];

    const layout = {
      autosize: true,
      margin: { l: 52, r: 16, t: 8, b: 50 },
      paper_bgcolor: 'rgba(0,0,0,0)',
      plot_bgcolor:  'rgba(0,0,0,0)',
      font: { family: "'IBM Plex Sans', sans-serif", color: C.inkSoft, size: 12 },
      shapes: refLines,
      xaxis: {
        tickmode: 'array',
        tickvals: [0, 180, 360, 540, 720, 900, 1080, 1260, 1440],
        ticktext: L(['12am', '3am', '6am', '9am', '12pm', '3pm', '6pm', '9pm', '12am'],
                    ['0h', '3h', '6h', '9h', '12h', '15h', '18h', '21h', '0h']),
        range: [0, 1440],
        showgrid: true, gridcolor: C.grid,
        zeroline: false,
        tickfont: { color: C.inkSoft }
      },
      yaxis: {
        title: { text: 'mg/dL', font: { color: C.inkSoft } },
        range: [40, 220],
        showgrid: true, gridcolor: C.grid,
        zeroline: false,
        tickfont: { color: C.inkSoft },
        tickvals: [50, 60, 100, 150, 180, 200]
      },
      hoverlabel: { bgcolor: '#FFFFFF', bordercolor: C.inkMid, font: { color: C.ink } },
      showlegend: false
    };

    const config = {
      displaylogo: false, responsive: true,
      modeBarButtonsToRemove: ['select2d', 'lasso2d', 'autoScale2d', 'toggleSpikelines']
    };

    Plotly.newPlot(el, traces, layout, config);
    console.log('[glucose-patterns] rendered', xs.length, 'slots');
  } catch (e) {
    console.error('[glucose-patterns]', e);
  }
}

    const sysL2 = sysMean.map((m, i) => m - 2 * sysSd[i]);
    const sysU2 = sysMean.map((m, i) => m + 2 * sysSd[i]);

    const diaL2 = diaMean.map((m, i) => m - 2 * diaSd[i]);
    const diaU2 = diaMean.map((m, i) => m + 2 * diaSd[i]);
    const diaL1 = diaMean.map((m, i) => m - diaSd[i]);

   spot-check days made the long timeline noisy). Oura 2025-10 ->.
   Line breaks at gaps >1 week so missing weeks are not bridged.
   Red palette to match the HR-by-time-of-day chart. */
function renderRhrTimelineChart() {
  const el = document.getElementById('rhr-weekly-timeline');
  if (!el) return;
  if (!VR.RHR_BY_WEEK || typeof Plotly === 'undefined') return;

  try {
    const RBW = VR.RHR_BY_WEEK;
    /* Insert nulls where consecutive weeks are >7 days apart -> visible gaps. */
    const xs = [], ys = [], ns = [];
    const WEEK_MS = 7 * 24 * 3600 * 1000;
    RBW.forEach((r, i) => {
      if (i > 0) {
        const prev = Date.parse(RBW[i - 1].week);
        if (Date.parse(r.week) - prev > WEEK_MS) { xs.push(r.week); ys.push(null); ns.push(null); }
      }
      xs.push(r.week); ys.push(r.rhr); ns.push(r.n);
    });

    const trace = {
      x: xs, y: ys,
      type: 'scatter', mode: 'lines',
      line: { color: '#5E1D1D', width: 2 },  /* red-800, same as HR-by-TOD median */
      connectgaps: false,
      customdata: ns,

/* ── Data-range selector ──
   All = static data.js consts, no network. 30/60/90 anchor on the most
   recent day present in the daily series (not "today", so a stale export
   doesn't yield near-empty windows); Custom takes any from/to pair. Every
   non-All pick calls GET /api/vitals-range and swaps the truncated series
   into VR, then re-renders. Language flips keep the active range because
   they re-render from VR. */
(function initVitalsRange() {
  const bar = document.getElementById('vitalsRangeBar');
  if (!bar) return;
  const pills   = [...bar.querySelectorAll('.vr-pill')];
  const custom  = document.getElementById('vrCustom');
  const fromEl  = document.getElementById('vrFrom');
  const toEl    = document.getElementById('vrTo');
  const apply   = document.getElementById('vrApply');
  const status  = document.getElementById('vrStatus');
  const CLERK   = 'pending:joao';

  /* Latest + earliest day across the daily series — selector bounds. */
  const dailySeries = [VR_DEFAULTS.STEPS, VR_DEFAULTS.BP, VR_DEFAULTS.WEIGHT, VR_DEFAULTS.STRESS_RES];
  const allDays = dailySeries.flatMap(a => (a && a.length) ? [a[0][0], a[a.length - 1][0]] : []).sort();
  const firstDay = allDays[0] || '2025-10-01';
  const lastDay  = allDays[allDays.length - 1] || new Date().toISOString().slice(0, 10);
  fromEl.value = firstDay; toEl.value = lastDay;
  fromEl.min = toEl.min = firstDay; fromEl.max = toEl.max = lastDay;

  let seq = 0;  // guards against out-of-order fetch responses
  const setActive = (btn) => pills.forEach(p => p.classList.toggle('active', p === btn));
  const setStatus = (en, pt, isErr) => {
    status.innerHTML = en
      ? `<span class="lang-en">${en}</span><span class="lang-pt">${pt}</span>` : '';
    status.classList.toggle('vr-err', !!isErr);
  };

  /* "Updating" modal card — shown while the backend filters + charts rebuild. */
  const overlay = document.createElement('div');
  overlay.className = 'vr-overlay';
  overlay.innerHTML = '<div class="vr-overlay-card"><div class="vr-spinner"></div>'
    + '<div class="vr-overlay-title"><span class="lang-en">Updating</span><span class="lang-pt">Atualizando</span></div>'
    + '<div class="vr-overlay-sub"><span class="lang-en">Filtering all data to the selected period…</span><span class="lang-pt">Filtrando todos os dados para o per&iacute;odo selecionado…</span></div></div>';
  overlay.hidden = true;
  document.body.appendChild(overlay);
  const showOverlay = (on) => { overlay.hidden = !on; };

  /* Persist the selection so a page reload (e.g. insights-update.js calls
     location.reload() when a rebuild job finishes) restores the range
     instead of silently snapping back to "All". */
  const STORE = 'jc_vitals_range';
  const remember = (mode, from, to) => {
    try { sessionStorage.setItem(STORE, JSON.stringify({ mode, from, to })); } catch (_) {}
  };
  const forget = () => { try { sessionStorage.removeItem(STORE); } catch (_) {} };

  async function applyRange(from, to) {
    const mySeq = ++seq;
    showOverlay(true);
    setStatus('Loading…', 'Carregando…');
    try {
      const viewer = sessionStorage.getItem('jc_viewer_clerk') || '';
      const res = await fetch(`/api/vitals-range?clerk=${encodeURIComponent(CLERK)}&from=${from}&to=${to}`,
        { headers: viewer ? { 'X-Viewer-Clerk': viewer } : {} });
      if (!res.ok) {
        let msg = `HTTP ${res.status}`;
        try { msg = (await res.json()).error || msg; } catch (_) { /* keep status */ }
        throw new Error(msg);
      }
      const d = await res.json();
      if (mySeq !== seq) return;  // a newer selection superseded this one
      VR.WEIGHT = d.weight;                       VR.STEPS = d.steps;
      VR.HRV_RHR = d.hrvRhr;                      VR.STRESS_RES = d.stressRes;
      VR.BP = d.bp;                               VR.BP_BY_WEEK = d.bpByWeek;
      VR.SLEEP_BOX = d.sleepBox;                  VR.SLEEP_STAGES_BY_WEEK = d.sleepStagesByWeek;
      VR.HR_BY_TOD = d.hrByTod;                   VR.RHR_BY_WEEK = d.rhrByWeek;
      /* Glucose ships complete in data.js — filter client-side by day. */
      VR.GLUCOSE = VR_DEFAULTS.GLUCOSE.filter((r) => { const day = r[0].slice(0, 10); return day >= from && day <= to; });
      renderAllVitalsCharts();
      setStatus(`Showing ${from} → ${to} · ${d.meta.nights} nights · ${d.meta.hrReadings.toLocaleString()} HR readings`,
                `Exibindo ${from} → ${to} · ${d.meta.nights} noites · ${d.meta.hrReadings.toLocaleString()} leituras de FC`);
    } catch (err) {
      if (mySeq !== seq) return;
      console.error('[vitals-range]', err);
      setStatus(`Could not load range (${err.message}). Showing previous data.`,
                `Não foi possível carregar o período (${err.message}). Exibindo dados anteriores.`, true);
    } finally {
      if (mySeq === seq) showOverlay(false);
    }
  }

  function resetAll() {
    seq++;
    forget();
    Object.assign(VR, VR_DEFAULTS);
    renderAllVitalsCharts();
    setStatus('', '');
    showOverlay(false);
  }

  const presetWindow = (days) => {
    const anchor = new Date(lastDay + 'T12:00:00Z');
    anchor.setUTCDate(anchor.getUTCDate() - (days - 1));
    return [anchor.toISOString().slice(0, 10), lastDay];
  };

  pills.forEach((btn) => btn.addEventListener('click', () => {
    const r = btn.dataset.range;
    setActive(btn);
    custom.hidden = r !== 'custom';
    if (r === 'all') return resetAll();
    if (r === 'custom') return;  // waits for Apply
    const [from, to] = presetWindow(parseInt(r, 10));
    remember(r, from, to);
    applyRange(from, to);
  }));

  apply.addEventListener('click', () => {
    const from = fromEl.value, to = toEl.value;
    if (!from || !to) return setStatus('Pick both dates.', 'Escolha as duas datas.', true);
    if (from > to)    return setStatus('"From" must be before "to".', '"De" deve vir antes de "até".', true);
    remember('custom', from, to);
    applyRange(from, to);
  });

  /* Restore a persisted range after any reload. */
  try {
    const saved = JSON.parse(sessionStorage.getItem(STORE) || 'null');
    if (saved && saved.from && saved.to) {
      const btn = pills.find(p => p.dataset.range === saved.mode);
      if (btn) { setActive(btn); custom.hidden = saved.mode !== 'custom'; }
      if (saved.mode === 'custom') { fromEl.value = saved.from; toEl.value = saved.to; }
      applyRange(saved.from, saved.to);
    }
  } catch (_) { /* corrupted state — stay on All */ }
})();

      `<div class="lab-test lab-test-${status}">` +
        '<div class="lab-test-head">' +
          `<div class="lab-test-name">${langSpan(m.en, m.pt)}</div>` +
          '<div class="lab-test-meta">' +
            `<span class="lab-test-val"><span class="lab-val-num">${fmt(m.v)}</span>${unit}</span>` +
            `<span class="pill ${pillCls}">${pillTxt}</span>` +
          '</div>' +
        '</div>' +
        '<div class="lab-bar-wrap">' +
          '<div class="lab-bar">' +
            '<div class="lab-bar-bg"></div>' +
            '<div class="lab-bar-range"></div>' +
            '<div class="lab-bar-tick lab-bar-tick-min"></div>' +
            '<div class="lab-bar-tick lab-bar-tick-max"></div>' +
            `<div class="lab-bar-marker ${markerCls}" style="left:${pct.toFixed(2)}%;"><div class="lab-bar-dot"></div></div>` +
          '</div>' +
          `<div class="lab-bar-labels"><span>${langSpan('min ' + fmt(m.lo), 'mín ' + fmt(m.lo))}</span><span>${langSpan('max ' + fmt(m.hi), 'máx ' + fmt(m.hi))}</span></div>` +
        '</div>' +
        '<div class="lab-test-foot">' +
          `<div class="lab-test-ref">${langSpan('Reference:', 'Referência:')} ${fmt(m.lo)} – ${fmt(m.hi)}${m.u ? ' ' + m.u : ''}</div>` +
        '</div>' +
      '</div>'
    );
  }

  function panel(titleEn, titlePt, metaEn, metaPt, rows) {
    return (
      '<div class="chart-card">' +
        '<div class="chart-card-head">' +
          `<div class="chart-card-title">${langSpan(titleEn, titlePt)}</div>` +
          `<div class="chart-card-meta">${langSpan(metaEn, metaPt)}</div>` +
        '</div>' +
        `<div class="inbody-panel-body">${rows.map(barRow).join('')}</div>` +
      '</div>'
    );
  }

  if (barsMount) {
    barsMount.innerHTML =
      '<div class="chart-card mt-3">' +
        '<div class="chart-card-head">' +
          `<div class="chart-card-title">${langSpan('Body composition analysis', 'Análise da composição corporal')}</div>` +
          `<div class="chart-card-meta">${langSpan('Water, protein, mineral, fat and total weight vs. the InBody reference range', 'Água, proteína, mineral, gordura e peso total vs. faixa de referência InBody')}</div>` +
        '</div>' +
        `<div class="inbody-panel-body">${COMPOSITION.map(barRow).join('')}</div>` +
      '</div>' +
      '<div class="inbody-bars-pair">' +
        panel('Muscle-Fat analysis', 'Análise músculo-gordura',
              'Weight, skeletal muscle mass and body-fat mass', 'Peso, massa muscular esquelética e massa de gordura',
              MUSCLE_FAT) +
        panel('Obesity diagnosis', 'Diagnóstico de obesidade',
              'BMI, body-fat % and waist-hip ratio', 'IMC, PGC e relação cintura-quadril',
              OBESITY) +
      '</div>';
  }

  // — Segmental SVG (androgynous figure) + overlaid badges —
  function silhouette() {
    return (
      '<svg class="inbody-fig" viewBox="0 0 220 380" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' +
        '<g fill="#E8F0F7" stroke="#7A95B5" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round">' +
          '<circle cx="110" cy="34" r="20"/>' +
          '<path d="M101 54 Q110 60 119 54 Q121 64 118 68 Q110 70 102 68 Q99 64 101 54 Z"/>' +
          '<path d="M70 70 Q 64 96 68 130 Q 72 162 74 180 Q 70 200 68 220 L 152 220 Q 150 200 146 180 Q 148 162 152 130 Q 156 96 150 70 Q 110 76 70 70 Z"/>' +
          '<path d="M70 70 Q 48 78 42 102 Q 36 142 38 190 Q 42 212 52 214 Q 60 208 64 192 Q 68 158 70 130 Q 70 100 70 70 Z"/>' +
          '<path d="M150 70 Q 172 78 178 102 Q 184 142 182 190 Q 178 212 168 214 Q 160 208 156 192 Q 152 158 150 130 Q 150 100 150 70 Z"/>' +
          '<path d="M68 220 Q 66 270 70 320 Q 74 350 78 360 Q 90 364 100 358 Q 102 320 104 270 Q 106 240 108 220 Q 88 222 68 220 Z"/>' +
          '<path d="M112 220 Q 114 240 116 270 Q 118 320 120 358 Q 130 364 142 360 Q 146 350 150 320 Q 154 270 152 220 Q 132 222 112 220 Z"/>' +
        '</g>' +
      '</svg>'
    );
  }
  function badge(r) {
    const cls = r.status === 'normal' ? 'inbody-fig-status-normal' : 'inbody-fig-status-flag';
    const lbl = r.status === 'normal' ? langSpan('Normal', 'Normal')
              : r.status === 'below'  ? langSpan('Below', 'Abaixo')
              :                         langSpan('Above', 'Acima');
    return (
      `<div class="inbody-fig-label inbody-fig-label-${r.limb}">` +
        `<div class="inbody-fig-val">${fmt(r.kg)} kg</div>` +
        `<div class="inbody-fig-pct">${fmt(r.pct)}%</div>` +
        `<span class="inbody-fig-status ${cls}">${lbl}</span>` +
      '</div>'
    );
  }
  function figure(titleEn, titlePt, rows) {
    return (
      '<div class="inbody-seg">' +
        `<h3 class="inbody-seg-title">${langSpan(titleEn, titlePt)}</h3>` +
        `<div class="inbody-fig-wrap">${silhouette()}${rows.map(badge).join('')}</div>` +
      '</div>'
    );
  }
  if (segMount) {
    segMount.innerHTML =
      '<div class="inbody-seg-grid">' +
        figure('Lean mass by limb', 'Massa magra por membro', LEAN) +
        figure('Fat mass by limb', 'Gordura por membro', FAT) +
      '</div>';
  }
})();
</script>
<script>
(function(){
  try { if (typeof renderAllVitalsCharts==='function') renderAllVitalsCharts(); } catch(e){ console.error('renderAll',e); }
  var CANV=["bodyChart","cardioChart","bpChart","bpDailyChart","stepsChart","exerciseMixChart","stressChart","sleepStageChart"], PLOT=["glucoseChart","glucosePatternsChart","hrPatternsChart","rhr-weekly-timeline","bpPatternsChart","sleep-total-weekly-timeline","sleep-stage-weekly-composition"];
  setTimeout(function(){
    var out={};
    CANV.forEach(function(id){ try{ var c=document.getElementById(id); out[id]=c?c.toDataURL('image/png'):''; }catch(e){ out[id]=''; } });
    Promise.all(PLOT.map(function(id){
      var el=document.getElementById(id);
      return (el && window.Plotly) ? Plotly.toImage(el,{format:'png',width:760,height:380,scale:2}).then(function(u){return [id,u];}).catch(function(){return [id,''];}) : Promise.resolve([id,'']);
    })).then(function(rs){ rs.forEach(function(r){ out[r[0]]=r[1]; }); document.getElementById('out').textContent=JSON.stringify(out); document.title='READY'; });
  }, 1200);
})();
</script>
